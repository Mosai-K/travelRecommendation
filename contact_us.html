<!DOCTYPE html>
<html>

<head>
    <title>Contact Us - Swift Travel</title>
    <link rel="stylesheet" href="travel_recommendation.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://kit.fontawesome.com/3228e8efee.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</head>

<body>
    <nav class="navbar bg-dark sticky-top" data-bs-theme="dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">
                <img src="./assets/travel-logo-design.jpg" alt="Logo" width="35" height="30"
                    class="d-inline-block align-text-top">
                Swift Travel
            </a>
            <div>
                <ul class="nav justify-content-center align-text-center nav-pills">
                    <li class="nav-item">
                        <a class="nav-link" href="travel_recommendation.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="about-us.html">About Us</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="contact_us.html">Contact Us</a>
                    </li>
                </ul>
            </div>
            <form class="d-flex" role="search">
                <div class="input-group" style="width: 400px;"></div>
                <input class="form-control" id="conditionInput" type="search"
                    placeholder="Enter a destination or a keyword" aria-label="Search" />
                <button class="btn btn-outline-secondary" type="button"
                    onclick="this.previousElementSibling.value=''">Clear</button>
                <button class="btn btn-outline-success" id="btnSearch" type="submit">Search</button>
        </div>
        </form>
        </div>
    </nav>
    <br>
    <div class="container mt-4 justify-content-center align-items-center" style="width: 50vw;">
        <h2 style="color: aliceblue;">Contact Us</h2>
        <form id="contactForm">
            <div class="mb-3">
                <label for="name" class="form-label">Name</label>
                <input type="text" class="form-control" id="name" placeholder="John Doe">
            </div>

            <div class="mb-3">
                <label for="email" class="form-label">Email address</label>
                <input type="email" class="form-control" id="email" placeholder="name@example.com">
            </div>
            <div class="mb-3">
                <label for="message" class="form-label">Message</label>
                <textarea class="form-control" id="message" rows="4"></textarea>
            </div>
            <div class="d-grid gap-2">
                <button class="btn btn-primary" id="submit" type="submit">Send</button>
            </div>
        </form>
        <p id="successMsg"
            style="display:none; color: green; background-color: white; padding: 10px; margin-top: 20px; border-radius: 5px;">
            Message sent successfully!
        </p>
    </div>
    <div class="container d-flex justify-content-start align-items-center">
        <section id="brand-icons" class="social-media-link d-flex flex-column justify-content-start me-4">
        <a href="https://www.facebook.com" target="_blank" class="mb-3 brand" style="color: rgb(14, 84, 117);"><i class="fab fa-facebook-f fa-2x"></i></a>
        <a href="https://www.x.com" target="_blank" class="mb-3 brand" style="color: rgb(14, 84, 117);"><i class="fab fa-x-twitter fa-2x"></i></a>
        <a href="https://www.instagram.com" target="_blank" class="mb-3 brand" style="color: rgb(14, 84, 117);"><i class="fab fa-instagram fa-2x"></i></a>
        <a href="https://www.linkedin.com" target="_blank" class="mb-3 brand" style="color: rgb(14, 84, 117);"><i class="fab fa-linkedin-in fa-2x"></i></a>
        </section>
        <br>
    </div>

    <script>
        document.getElementById('contactForm').addEventListener('submit', function(e) {
            e.preventDefault();
            document.getElementById('successMsg').style.display = 'block';
            this.reset();
        });
    </script>
</body>

</html>
